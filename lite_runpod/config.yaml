server:
  host: 0.0.0.0
  port: 8005
  log_file_path: logs/tts_server.log
  log_file_max_size_mb: 10
  log_file_backup_count: 5
  ssl_certfile: null
  ssl_keyfile: null

lite_server:
  port: 8005

model:
  repo_id: chatterbox

tts_engine:
  device: cuda
  predefined_voices_path: voices
  reference_audio_path: reference_audio
  default_voice_id: default_sample.wav
  cpu_num_threads: 0
  cpu_num_interop_threads: 1

paths:
  model_cache: model_cache
  output: outputs

generation_defaults:
  temperature: 0.6
  exaggeration: 0.3
  cfg_weight: 0.5
  seed: 1234
  speed_factor: 1.0
  language: en

audio_output:
  format: wav
  sample_rate: 24000
  max_reference_duration_sec: 30
  save_to_disk: false

debug:
  save_intermediate_audio: false
