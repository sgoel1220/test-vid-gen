<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creepy Brain - Story Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #e94560; margin-bottom: 10px; }
    h2 { color: #0f3460; background: #e94560; padding: 8px 12px; border-radius: 4px; }
    .stories-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .story-btn {
      background: #16213e;
      border: 1px solid #e94560;
      color: #eee;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .story-btn:hover { background: #e94560; }
    .story-btn.active { background: #e94560; }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      background: #e94560;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #ff6b6b; }
    button:disabled { background: #555; cursor: not-allowed; }
    .script-box {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      white-space: pre-wrap;
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1.8;
      max-height: 70vh;
      overflow-y: auto;
    }
    .act-title {
      color: #e94560;
      font-size: 20px;
      font-weight: bold;
      margin: 30px 0 15px 0;
      border-bottom: 1px solid #e94560;
      padding-bottom: 5px;
    }
    .act-title:first-child { margin-top: 0; }
    .meta {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .status { padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    .status.completed { background: #2ecc71; color: white; }
    .status.generating { background: #f39c12; color: white; }
    .status.failed { background: #e74c3c; color: white; }
    .copied {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2ecc71;
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      display: none;
    }
    .empty { color: #888; font-style: italic; }
    .audio-section {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .audio-info { color: #888; font-size: 14px; }
    audio { border-radius: 4px; }
    .generate-section {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .generate-section label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .generate-section textarea, .generate-section select {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #eee;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .generate-section textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .generate-section select option { background: #1a1a2e; }
    .gen-status { margin-top: 10px; font-size: 13px; color: #f39c12; min-height: 20px; }
    .gen-status.ok { color: #2ecc71; }
    .gen-status.err { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>Creepy Brain</h1>
  <p class="meta">Story Viewer & Script Copier</p>

  <h2>Generate Story</h2>
  <div class="generate-section">
    <label for="premise-input">Premise</label>
    <textarea id="premise-input" placeholder="A lonely lighthouse keeper discovers a message in a bottle that changes everything..."></textarea>
    <label for="voice-select">Voice</label>
    <select id="voice-select"><option value="">Loading voices...</option></select>
    <button id="generate-btn">Generate Story</button>
    <div class="gen-status" id="gen-status"></div>
  </div>

  <h2>Stories</h2>
  <div class="stories-list" id="stories-list">
    <span class="empty">Loading stories...</span>
  </div>

  <div class="controls">
    <button id="copy-btn" disabled>Copy Full Script</button>
    <button id="refresh-btn">Refresh Stories</button>
  </div>

  <h2>Audio Player</h2>
  <div class="audio-section">
    <audio id="audio-player" controls style="width: 100%; margin-bottom: 10px;">
      <source src="/static/full_story.wav" type="audio/wav">
      Your browser does not support the audio element.
    </audio>
    <div class="audio-info" id="audio-info">
      <span class="empty">Loading audio info...</span>
    </div>
  </div>

  <div class="script-box" id="script-box">
    <span class="empty">Select a story above to view the script.</span>
  </div>

  <div class="copied" id="copied">Copied to clipboard!</div>

  <script>
    const API = '';
    let currentStory = null;

    function esc(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function loadStories() {
      const list = document.getElementById('stories-list');
      list.innerHTML = '<span class="empty">Loading...</span>';

      try {
        const res = await fetch(`${API}/api/stories?limit=20`);
        const stories = await res.json();

        if (stories.length === 0) {
          list.innerHTML = '<span class="empty">No stories yet.</span>';
          return;
        }

        list.innerHTML = stories.map(s => `
          <button class="story-btn" data-id="${esc(s.id)}">
            ${esc(s.premise.slice(0, 40))}…
            <span class="status ${esc(s.status)}">${esc(s.status)}</span>
          </button>
        `).join('');

        document.querySelectorAll('.story-btn').forEach(btn => {
          btn.addEventListener('click', () => loadStory(btn.dataset.id));
        });
      } catch (e) {
        list.innerHTML = `<span class="empty">Error: ${e.message}</span>`;
      }
    }

    async function loadStory(id) {
      const box = document.getElementById('script-box');
      box.innerHTML = '<span class="empty">Loading story...</span>';

      document.querySelectorAll('.story-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.id === id);
      });

      try {
        const res = await fetch(`${API}/api/stories/${id}`);
        const story = await res.json();
        currentStory = story;

        if (!story.acts || story.acts.length === 0) {
          box.innerHTML = `<span class="empty">Story is ${story.status}. No acts yet.</span>`;
          document.getElementById('copy-btn').disabled = true;
          return;
        }

        const html = story.acts.map(act => `
          <div class="act-title">Act ${esc(act.act_number)}: ${esc(act.title)}</div>
          <div>${act.content ? esc(act.content) : '<em>No content</em>'}</div>
        `).join('\n');

        box.innerHTML = html;
        document.getElementById('copy-btn').disabled = false;
      } catch (e) {
        box.innerHTML = `<span class="empty">Error: ${e.message}</span>`;
      }
    }

    function getPlainScript() {
      if (!currentStory || !currentStory.acts) return '';
      return currentStory.acts.map(act =>
        `# Act ${act.act_number}: ${act.title}\n\n${act.content || ''}`
      ).join('\n\n---\n\n');
    }

    document.getElementById('copy-btn').addEventListener('click', async () => {
      const text = getPlainScript();
      if (!text) return;

      await navigator.clipboard.writeText(text);
      const copied = document.getElementById('copied');
      copied.style.display = 'block';
      setTimeout(() => copied.style.display = 'none', 2000);
    });

    document.getElementById('refresh-btn').addEventListener('click', loadStories);

    async function loadVoices() {
      const sel = document.getElementById('voice-select');
      try {
        const res = await fetch(`${API}/api/voices`);
        const voices = await res.json();
        if (!voices.length) {
          sel.innerHTML = '<option value="">No voices configured</option>';
          return;
        }
        sel.innerHTML = voices.map(v => `<option value="${esc(v.name)}">${esc(v.name)}</option>`).join('');
      } catch (e) {
        sel.innerHTML = '<option value="">Error loading voices</option>';
      }
    }

    let pollTimer = null;
    function startPolling(storyId) {
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`${API}/api/stories/${storyId}`);
          const story = await res.json();
          const status = document.getElementById('gen-status');
          if (story.status === 'completed') {
            clearInterval(pollTimer);
            status.textContent = 'Story ready!';
            status.className = 'gen-status ok';
            document.getElementById('generate-btn').disabled = false;
            loadStories();
          } else if (story.status === 'failed') {
            clearInterval(pollTimer);
            status.textContent = 'Generation failed.';
            status.className = 'gen-status err';
          } else {
            status.textContent = `Generating... (${story.status})`;
          }
        } catch (_) {}
      }, 5000);
    }

    document.getElementById('generate-btn').addEventListener('click', async () => {
      const premise = document.getElementById('premise-input').value.trim();
      const voice = document.getElementById('voice-select').value;
      const status = document.getElementById('gen-status');

      if (premise.length < 10) {
        status.textContent = 'Premise must be at least 10 characters.';
        status.className = 'gen-status err';
        return;
      }
      if (!voice) {
        status.textContent = 'Select a voice first.';
        status.className = 'gen-status err';
        return;
      }

      document.getElementById('generate-btn').disabled = true;
      status.textContent = 'Submitting...';
      status.className = 'gen-status';

      try {
        const res = await fetch(`${API}/api/workflows`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ premise, voice_name: voice }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || res.statusText);
        }
        const wf = await res.json();
        status.textContent = 'Workflow started — generating…';
        status.className = 'gen-status';
        // Poll the workflow for story_id, then poll story
        const wfPoll = setInterval(async () => {
          try {
            const r = await fetch(`${API}/api/workflows/${wf.id}`);
            const w = await r.json();
            if (w.result?.story_id) {
              clearInterval(wfPoll);
              startPolling(w.result.story_id);
            } else if (w.status === 'failed' || w.status === 'cancelled') {
              clearInterval(wfPoll);
              status.textContent = `Workflow ${w.status}.`;
              status.className = 'gen-status err';
              document.getElementById('generate-btn').disabled = false;
            }
          } catch (_) {}
        }, 3000);
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
        status.className = 'gen-status err';
        document.getElementById('generate-btn').disabled = false;
      }
    });

    // Audio player info
    const audioPlayer = document.getElementById('audio-player');
    const audioInfo = document.getElementById('audio-info');

    audioPlayer.addEventListener('loadedmetadata', () => {
      const mins = Math.floor(audioPlayer.duration / 60);
      const secs = Math.floor(audioPlayer.duration % 60);
      audioInfo.innerHTML = `Duration: ${mins}:${secs.toString().padStart(2, '0')}`;
    });

    audioPlayer.addEventListener('error', () => {
      audioInfo.innerHTML = '<span class="empty">No audio file available yet.</span>';
    });

    loadStories();
    loadVoices();
  </script>
</body>
</html>
