services:
  brain:
    build:
      context: ../..
      dockerfile: services/creepy-brain/Dockerfile
    image: creepy-brain:latest
    container_name: creepy-brain
    ports:
      - "8006:8006"
    env_file:
      - path: .env
        required: false  # Falls back to environment block values below
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=creepy_brain
      - POSTGRES_PASSWORD=dev_password
      - POSTGRES_DB=creepy_brain
      # - JSON_LOGS=true  # Set to false for pretty dev logs, true for production JSON
      # ANTHROPIC_API_KEY and LLM_MODEL are loaded from .env (copy .env.example → .env)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: creepy-brain-postgres
    environment:
      - POSTGRES_USER=creepy_brain
      - POSTGRES_PASSWORD=dev_password
      - POSTGRES_DB=creepy_brain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Avoid conflict with default postgres port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creepy_brain"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: creepy-brain-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: creepy-brain-uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  postgres_data:
  uptime_kuma_data:
