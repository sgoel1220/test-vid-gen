name: docker

on:
  push:
    branches: [ main, docker-release ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, docker-release ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: "docker: ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: tts-server
            dockerfile: services/tts-server/Dockerfile
            image: tts-server
            source_path: services/tts-server/
          - name: creepy-brain
            dockerfile: services/creepy-brain/Dockerfile
            image: creepy-brain
            source_path: services/creepy-brain/
          - name: image-server
            dockerfile: services/image-server/Dockerfile
            image: image-server
            source_path: services/image-server/
          - name: music-server
            dockerfile: services/music-server/Dockerfile
            image: music-server
            source_path: services/music-server/
          - name: sfx-server
            dockerfile: services/sfx-server/Dockerfile
            image: sfx-server
            source_path: services/sfx-server/
          - name: sdxl-server
            dockerfile: sdxl-server/Dockerfile
            image: sdxl-server
            source_path: sdxl-server/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if service files changed
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          # Fall back to building if we can't determine what changed (e.g. first push)
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null) || CHANGED=""
          if [ -z "$CHANGED" ] \
            || echo "${{ github.ref }}" | grep -q "^refs/tags/" \
            || echo "$CHANGED" | grep -qE "^\.github/workflows/docker-build\.yml$" \
            || echo "$CHANGED" | grep -qE "^${{ matrix.service.source_path }}"; then
            echo "needed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in services/${{ matrix.service.name }} — skipping build"
          fi

      # music-server installs torch 2.10.0+cu128 (~8 GB); free disk space first.
      - name: Free disk space (large GPU images)
        if: (matrix.service.name == 'music-server' || matrix.service.name == 'sdxl-server') && steps.changes.outputs.needed == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Docker Buildx
        if: steps.changes.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.changes.outputs.needed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push ${{ matrix.service.name }}
        if: steps.changes.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # All GPU services use registry cache: combined layers exceed GHA's 10 GB
          # repo limit, and shared pytorch base layers are deduplicated in GHCR.
          # creepy-brain is CPU-only (~500 MB) so GHA cache is fine there.
          cache-from: ${{ matrix.service.name == 'creepy-brain' && format('type=gha,scope={0}', matrix.service.name) || format('type=registry,ref={0}/{1}/{2}-cache:buildcache', env.REGISTRY, github.repository_owner, matrix.service.name) }}
          cache-to: ${{ matrix.service.name == 'creepy-brain' && format('type=gha,mode=max,scope={0}', matrix.service.name) || format('type=registry,ref={0}/{1}/{2}-cache:buildcache,mode=max', env.REGISTRY, github.repository_owner, matrix.service.name) }}
          platforms: linux/amd64
